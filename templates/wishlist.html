<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wishlist | ByteBites</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Syne:wght@600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{min-height:100vh;background:#0a0a0f;color:#e2e8f0;font-family:'Inter',sans-serif;display:flex;align-items:center;justify-content:center;background-image:radial-gradient(ellipse at 40% 40%,rgba(236,72,153,0.08) 0%,transparent 55%);}
.card{background:rgba(18,18,30,0.95);border:1px solid rgba(255,255,255,0.08);border-radius:24px;padding:60px 48px;text-align:center;max-width:420px;width:90%;box-shadow:0 30px 60px rgba(0,0,0,0.4);}
.icon{font-size:3.5rem;margin-bottom:20px;animation:float 3s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
h2{font-family:'Syne',sans-serif;font-size:1.7rem;margin-bottom:10px;}
p{color:#475569;font-size:0.9rem;line-height:1.6;margin-bottom:28px;}
.badge{display:inline-block;padding:4px 16px;border-radius:20px;font-size:0.72rem;font-weight:700;background:rgba(236,72,153,0.12);color:#f472b6;border:1px solid rgba(236,72,153,0.25);margin-bottom:28px;letter-spacing:0.5px;}
.btn{display:inline-block;padding:12px 28px;border-radius:12px;font-family:'Inter',sans-serif;font-weight:600;font-size:0.88rem;text-decoration:none;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);color:#94a3b8;transition:all 0.2s;}
.btn:hover{border-color:rgba(0,212,255,0.3);color:#00d4ff;}
</style>
</head>
<body>
<div class="card">
  <div class="icon">💖</div>
  <h2>Wishlist</h2>
  <div class="badge">✨ Coming Soon</div>
  <p>Save your favourite items for quick ordering. This feature is currently under development.</p>
  <a href="/customer_dashboard" class="btn">← Back to Dashboard</a>
</div>
</body>
</html>
