<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shopkeeper Login | ByteBites</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Syne:wght@600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  min-height:100vh;background:#0a0a0f;color:#e2e8f0;
  font-family:'Inter',sans-serif;
  display:flex;align-items:center;justify-content:center;
  background-image:
    radial-gradient(ellipse at 25% 40%,rgba(124,58,237,0.15) 0%,transparent 55%),
    radial-gradient(ellipse at 75% 60%,rgba(16,185,129,0.08) 0%,transparent 55%);
}
.card{
  background:rgba(18,18,30,0.95);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:24px;padding:48px 40px;width:400px;
  box-shadow:0 0 60px rgba(124,58,237,0.12),0 30px 60px rgba(0,0,0,0.5);
  animation:fadeUp 0.6s ease;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.back-link{
  display:inline-flex;align-items:center;gap:6px;
  color:#475569;font-size:0.8rem;text-decoration:none;margin-bottom:28px;
  transition:color 0.2s;
}
.back-link:hover{color:#7c3aed;}
.icon{
  width:64px;height:64px;border-radius:16px;margin-bottom:20px;
  background:linear-gradient(135deg,rgba(124,58,237,0.2),rgba(16,185,129,0.1));
  border:1px solid rgba(124,58,237,0.3);
  display:flex;align-items:center;justify-content:center;font-size:1.8rem;
}
h2{font-family:'Syne',sans-serif;font-size:1.7rem;font-weight:700;margin-bottom:6px;}
.sub{color:#475569;font-size:0.85rem;margin-bottom:32px;}
.field{margin-bottom:20px;}
label{
  display:block;font-size:0.75rem;font-weight:600;
  color:#475569;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:8px;
}
input{
  width:100%;background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:10px;color:#e2e8f0;
  padding:13px 16px;font-family:'Inter',sans-serif;font-size:0.9rem;
  outline:none;transition:border-color 0.2s,box-shadow 0.2s;
}
input:focus{border-color:#7c3aed;box-shadow:0 0 0 3px rgba(124,58,237,0.15);}
input::placeholder{color:#334155;}
.btn{
  width:100%;padding:14px;border-radius:12px;border:none;cursor:pointer;
  font-family:'Inter',sans-serif;font-weight:700;font-size:0.95rem;
  background:linear-gradient(135deg,#6d28d9,#7c3aed);color:#fff;
  box-shadow:0 0 24px rgba(124,58,237,0.3);
  transition:all 0.25s;letter-spacing:0.5px;
}
.btn:hover{transform:translateY(-2px);box-shadow:0 0 40px rgba(124,58,237,0.55);}
</style>
</head>
<body>
<div class="card">
  <a href="/" class="back-link">← Back to Home</a>
  <div class="icon">🏪</div>
  <h2>Shopkeeper Login</h2>
  <p class="sub">Admin access — staff only.</p>
  <form action="/shopkeeper_login" method="POST">
    <div class="field">
      <label>Username</label>
      <input type="text" name="username" placeholder="Enter username" required>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" name="password" placeholder="••••••••" required>
    </div>
    <button type="submit" class="btn">Access Panel →</button>
  </form>
</div>
</body>
</html>
