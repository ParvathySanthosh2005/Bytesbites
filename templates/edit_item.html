<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Edit Item | ByteBites</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Syne:wght@600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{min-height:100vh;background:#0a0a0f;color:#e2e8f0;font-family:'Inter',sans-serif;display:flex;align-items:center;justify-content:center;padding:24px;background-image:radial-gradient(ellipse at 30% 40%,rgba(0,212,255,0.08) 0%,transparent 55%);}
.card{background:rgba(18,18,30,0.95);border:1px solid rgba(255,255,255,0.08);border-radius:24px;padding:48px 40px;width:100%;max-width:480px;box-shadow:0 30px 60px rgba(0,0,0,0.4);animation:fadeUp 0.6s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.back{display:inline-flex;align-items:center;gap:6px;color:#475569;font-size:0.8rem;text-decoration:none;margin-bottom:28px;transition:color 0.2s;}
.back:hover{color:#00d4ff;}
.icon{width:60px;height:60px;border-radius:14px;background:rgba(0,212,255,0.1);border:1px solid rgba(0,212,255,0.2);display:flex;align-items:center;justify-content:center;font-size:1.6rem;margin-bottom:20px;}
h2{font-family:'Syne',sans-serif;font-size:1.7rem;margin-bottom:6px;}
.sub{color:#475569;font-size:0.85rem;margin-bottom:32px;}
.field{margin-bottom:22px;}
label{display:block;font-size:0.75rem;font-weight:600;color:#475569;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:8px;}
input{width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:10px;color:#e2e8f0;padding:13px 16px;font-family:'Inter',sans-serif;font-size:0.9rem;outline:none;transition:border-color 0.2s,box-shadow 0.2s;}
input:focus{border-color:#00d4ff;box-shadow:0 0 0 3px rgba(0,212,255,0.1);}
.btn{width:100%;padding:14px;border-radius:12px;border:none;cursor:pointer;font-family:'Inter',sans-serif;font-weight:700;font-size:0.95rem;background:linear-gradient(135deg,#00b4d8,#00d4ff);color:#000;box-shadow:0 0 24px rgba(0,212,255,0.25);transition:all 0.25s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 0 40px rgba(0,212,255,0.45);}
</style>
</head>
<body>
<div class="card">
  <a href="/shopkeeper_dashboard" class="back">← Back to Menu</a>
  <div class="icon">✏️</div>
  <h2>Edit: {{ item['name'] }}</h2>
  <p class="sub">Update stock quantity and pricing.</p>
  <form action="/edit_item/{{ item['id'] }}" method="POST">
    <div class="field">
      <label>Price (₹)</label>
      <input type="number" name="price" value="{{ item['price'] }}" step="0.01" required>
    </div>
    <div class="field">
      <label>Stock Quantity</label>
      <input type="number" name="quantity" value="{{ item['quantity'] }}" required>
    </div>
    <button type="submit" class="btn">Save Changes →</button>
  </form>
</div>
</body>
</html>
